<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Buu cuenta nuestra historia Jenny ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- ESCENARIO ACTUAL -->
        <div class="escenario" id="escenario">
            <div class="escenario-titulo" id="escenarioTitulo"></div>
        </div>
        
        <!-- MAJIN BUU -->
        <img src="img/buu.png" class="buu" id="buuImg" alt="Majin Buu">
        
        <!-- JENNY -->
        <div class="jenny">
            <h2>JENNY ❤️</h2>
            <div class="corazones-jenny">💖💖💖</div>
        </div>
        
        <!-- NARRACIÓN -->
        <div class="narracion" id="narracionBox">
            <div class="historia-texto" id="historiaText"></div>
            <div class="respuesta">
                <button class="btn-si" onclick="siguienteEscenario()">❤️ Continúa nuestra historia</button>
            </div>
        </div>
        
        <!-- PROGRESO -->
        <div class="progreso">
            Capítulo <span id="capituloNum">1</span>/12
        </div>
        
        <!-- FINAL ÉPICO -->
        <div class="final-epico" id="finalEpico">
            <div class="trophy">💍✨</div>
            <h1>¡JENNY, SALGAMOS ADELANTE JUNTOS!</h1>
            <p>Dios nos unió el 1 de Noviembre. Él nos guía siempre.</p>
            <p class="diego-firma">"Dos podrán ayudarse mutuamente... ¡y tendrán éxito!" - Eclesiastés 4:9-10</p>
            <button onclick="reiniciar()">🔄 Revivir nuestra historia</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
