<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buu cuenta nuestra historia ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            font-family: Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        .escenario {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 45vh;
            background: linear-gradient(135deg, #87CEEB, #98D8C8);
            border-bottom: 4px solid #ff4081;
        }
        .escenario.nov1 { background: linear-gradient(135deg, #ff9a9e, #fecfef); }
        .escenario.nov7 { background: linear-gradient(135deg, #a8edea, #fed6e3); }
        .escenario.dios { background: linear-gradient(135deg, #667eea, #764ba2); }
        
        #titulo { 
            position: absolute; 
            bottom: 10px; 
            left: 50%; 
            transform: translateX(-50%);
            background: white; 
            padding: 12px 20px; 
            border-radius: 20px; 
            font-weight: bold; 
            color: #e91e63;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        #buu {
            position: absolute;
            bottom: 20%;
            left: 20%;
            width: 110px;
            animation: flotar 3s infinite;
        }
        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .jenny {
            position: absolute;
            right: 8%;
            bottom: 20%;
            text-align: center;
        }
        .jenny h2 {
            font-size: 26px;
            color: #ff4081;
            margin-bottom: 5px;
            animation: latir 2s infinite;
        }
        .corazones {
            font-size: 22px;
            animation: latir 1.5s infinite;
        }
        @keyframes latir {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        .narracion {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 25px;
            border-radius: 25px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 3px solid #ff4081;
        }
        #texto { 
            font-size: 17px; 
            line-height: 1.4; 
            margin-bottom: 20px; 
            min-height: 70px;
            color: #333;
        }
        #btnSiguiente {
            background: #ff4081;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255,64,129,0.4);
        }
        #btnSiguiente:active { transform: scale(0.98); }
        
        #progreso {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            color: #e91e63;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .final {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            display: none;
            max-width: 90%;
            border: 4px solid #4caf50;
        }
        .final h1 { color: #4caf50; font-size: 28px; margin-bottom: 15px; }
        .final button {
            background: #4caf50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="escenario" id="escenario">
            <div id="titulo">Capítulo 1</div>
        </div>
        
        <img src="img/buu.png" id="buu">
        
        <div class="jenny">
            <h2>JENNY ❤️</h2>
            <div class="corazones">💖💖💖</div>
        </div>
        
        <div class="narracion">
            <div id="texto">Cargando nuestra historia...</div>
            <button id="btnSiguiente">❤️ Comenzar historia</button>
        </div>
        
        <div id="progreso">Capítulo 1/12</div>
        
        <div class="final" id="final">
            <h1>💍 ¡Salgamos adelante JUNTOS!</h1>
            <p style="font-size: 18px; margin: 15px 0;">"Dos podrán ayudarse mutuamente" - Eclesiastés 4:9</p>
            <p style="font-size: 22px; color: #e91e63; font-weight: bold;">Te amo eternamente - Diego ❤️</p>
            <button onclick="reiniciar()">🔄 Revivir historia</button>
        </div>
    </div>

    <script>
        const historia = [
            {titulo: "1 NOVIEMBRE", texto: "Jenny, el MEJOR DÍA de mi vida fue 1 Noviembre. Te llamé temblando... tu voz me dio PAZ. ¡Eras MI PERSONA!", clase: "nov1"},
            {titulo: "7 NOVIEMBRE", texto: "El 7 te dije TE AMO de verdad. Vi en tus ojos que tú también me amas. ¡Nació nuestro AMOR ETERNO!", clase: "nov7"},
            {titulo: "Dios nos unió", texto: "\"Dos podrán ayudarse mutuamente\" - Eclesiastés 4:9. Dios puso tu nombre en mi corazón Jenny.", clase: "dios"},
            {titulo: "Amor verdadero", texto: "\"El amor todo lo sufre, todo lo cree\" - 1 Corintios 13:4-7. Así es nuestro amor Jenny.", clase: "dios"},
            {titulo: "Primer reto", texto: "Cuando todo se puso difícil, TÚ no te fuiste. Oramos juntos. ¡Eres MI FUERZA!", clase: "nov1"},
            {titulo: "Templo eterno", texto: "\"Lo que Dios unió, no lo separe el hombre\" - Mateo 19:6. Dios nos prepara Jenny.", clase: "dios"},
            {titulo: "Popayán hogar", texto: "Tú, yo, hijos, iglesia. Construiremos LEGADO eterno en Popayán. ¡Nuestra familia!", clase: "nov7"},
            {titulo: "Tu sonrisa", texto: "Tu sonrisa es mi razón para luchar. Jenny, TÚ MOTIVAS mi vida cada día.", clase: "nov1"},
            {titulo: "Promesa Dios", texto: "\"No te dejaré\" - Hebreos 13:5. Dios nos sostendrá en cada prueba.", clase: "dios"},
            {titulo: "Misión juntos", texto: "Serviremos en iglesia juntos. ¡Equipo misional inseparable para Dios!", clase: "nov7"},
            {titulo: "Planes Dios", texto: "\"Sé los planes que tengo para vosotros\" - Jeremías 29:11. Dios vio nuestro futuro.", clase: "dios"},
            {titulo: "HOY te pido", texto: "Jenny, ¿salimos adelante JUNTOS? ¿Construimos familia eterna que Dios diseñó? 💍", clase: "nov1"}
        ];

        let actual = 0;
        let gameRunning = true;

        document.getElementById('btnSiguiente').onclick = function() {
            siguiente();
        };

        function siguiente() {
            if (!gameRunning) return;
            
            if (actual >= historia.length - 1) {
                // FINAL
                document.getElementById('final').style.display = 'block';
                document.querySelector('.narracion').style.display = 'none';
                document.getElementById('progreso').style.display = 'none';
                confeti();
                gameRunning = false;
                return;
            }
            
            actual++;
            mostrar();
        }

        function mostrar() {
            const cap = historia[actual];
            document.getElementById('escenario').className = 'escenario ' + cap.clase;
            document.getElementById('titulo').textContent = cap.titulo;
            document.getElementById('texto').textContent = cap.texto;
            document.getElementById('progreso').textContent = `Capítulo ${actual + 1}/12`;
        }

        function reiniciar() {
            actual = 0;
            gameRunning = true;
            document.getElementById('final').style.display = 'none';
            document.querySelector('.narracion').style.display = 'block';
            document.getElementById('progreso').style.display = 'block';
            mostrar();
        }

        function confeti() {
            for(let i = 0; i < 40; i++) {
                setTimeout(() => {
                    let c = document.createElement('div');
                    c.innerHTML = '💖';
                    c.style.cssText = 'position:fixed;top:-20px;left:'+Math.random()*100+'%;font-size:'+(15+Math.random()*20)+'px;pointer-events:none;animation:caida 3s linear forwards;z-index:999;';
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 3000);
                }, i * 60);
            }
        }

        // INICIO
        setTimeout(mostrar, 500);
    </script>
</body>
</html>
