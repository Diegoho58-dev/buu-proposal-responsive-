<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Buu vence obstáculos por Jenny! 💪</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <!-- UI FIJA -->
    <div class="ui">
        <div class="score">⚡ <span id="score">0</span></div>
        <div class="hearts">❤️ <span id="lives">3</span></div>
    </div>
    
    <!-- GAME OVER ÉPICO -->
    <div class="game-over" id="gameOver">
        <div class="trophy">🏆</div>
        <h1>¡LO LOGRASTE!</h1>
        <p>Venciste <span id="finalScore">0</span> obstáculos</p>
        <p class="romantico">¡Por Jenny nada me detiene! ❤️</p>
        <button onclick="restartGame()">🔄 Jugar otra vez</button>
    </div>

    <!-- TOUCH ZONE -->
    <div class="touch-zone" id="touchZone"></div>

    <script src="script.js"></script>
</body>
</html>
