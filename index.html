<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buu cuenta nuestra historia Jenny ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- ESCENARIO -->
        <div class="escenario" id="escenario">
            <div class="escenario-titulo" id="escenarioTitulo">Capítulo 1</div>
        </div>
        
        <!-- BUU -->
        <img src="img/buu.png" class="buu" id="buu">
        
        <!-- JENNY -->
        <div class="jenny">
            <h2>JENNY ❤️</h2>
            <div class="corazones">💖💖💖</div>
        </div>
        
        <!-- HISTORIA -->
        <div class="narracion">
            <div class="texto" id="textoHistoria">
                Toca para continuar nuestra historia...
            </div>
            <button id="btnSiguiente" onclick="siguienteHistoria()">❤️ Continúa</button>
        </div>
        
        <!-- PROGRESO -->
        <div class="progreso" id="progreso">Capítulo 1/12</div>
        
        <!-- FINAL -->
        <div class="final" id="final">
            <h1>💍 ¡Salgamos adelante JUNTOS!</h1>
            <p>"Dos podrán ayudarse mutuamente" - Eclesiastés 4:9</p>
            <p style="font-size: 24px; color: #e91e63;">Te amo Jenny - Diego ❤️</p>
            <button onclick="reiniciar()">🔄 Reiniciar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
