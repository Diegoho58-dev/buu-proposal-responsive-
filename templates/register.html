{% extends "base.html" %}
{% block title %}Crear Cuenta | Jenny & Diego{% endblock %}

{% block content %}
<section class="section premium-login-section">
  <div class="premium-login-container">
    <!-- Left Side: Photo -->
    <div class="premium-login-photo">
      <div class="premium-photo-frame">
        <img src="{{ url_for('static', filename='couple_photo.jpg') }}" alt="Jenny & Diego" class="premium-photo">
      </div>
    </div>

    <!-- Right Side: Form -->
    <div class="premium-login-form-container">
      <div class="premium-login-card">
        <div class="premium-form-header">
          <h1 class="premium-form-title">Crear Cuenta</h1>
          <p class="premium-form-description">Únete a nosotros</p>
        </div>

        <form method="POST" class="premium-login-form">
          <div class="premium-form-field">
            <label for="username" class="premium-form-label">Usuario</label>
            <input 
              type="text" 
              id="username" 
              name="username" 
              class="premium-form-input" 
              placeholder="Elige un nombre de usuario"
              required
              autocomplete="username"
            >
            <div class="premium-input-underline"></div>
          </div>

          <div class="premium-form-field">
            <label for="password" class="premium-form-label">Contraseña</label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              class="premium-form-input" 
              placeholder="Crea una contraseña segura"
              required
              autocomplete="new-password"
            >
            <div class="premium-input-underline"></div>
          </div>

          <button type="submit" class="premium-btn-submit">
            Crear Cuenta
          </button>
        </form>

        <div class="premium-form-footer">
          <p class="premium-footer-text">¿Ya tienes cuenta? 
            <a href="{{ url_for('login') }}" class="premium-footer-link">Inicia sesión aquí</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
