{% extends "base.html" %}
{% block title %}Mensajes{% endblock %}

{% block content %}
<section class="section">
  <div class="container wall-grid">

    <article class="form-card">
      <p class="eyebrow">Nuevo mensaje</p>
      <h1 class="page-title">Escribir en el chat</h1>

      <p class="logged-as">Estás como {{ current_user.username }}</p>

      {% if partner %}
      <p class="logged-as">Conversando con {{ partner.username }}</p>

      <form id="chatForm" class="message-form">
        <label for="content">Tu mensaje</label>
        <textarea id="content" name="content" rows="4" required></textarea>
        <button type="submit" class="btn btn-primary">Enviar mensaje</button>
      </form>

      {% else %}
      <article class="empty-card">
        <h3>Chat no disponible</h3>
      </article>
      {% endif %}
    </article>

    <section>
      <div class="section-heading">
        <p class="eyebrow">Chat</p>
        <h2>Mensajes</h2>
      </div>

      <div class="messages-panel" id="messagesContainer"></div>
    </section>

  </div>
</section>

<!-- ✅ PASAR ID DE USUARIO -->
<script>
const CURRENT_USER_ID = {{ current_user.id }};
</script>

{% endblock %}
