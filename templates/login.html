{% extends "base.html" %}
{% block title %}Entrar{% endblock %}

{% block content %}
<section class="auth-shell auth-shell-login">
  <div class="auth-background">
    <span class="glow glow-one"></span>
    <span class="glow glow-two"></span>
    <span class="grid-dot dot-1"></span>
    <span class="grid-dot dot-2"></span>
    <span class="grid-dot dot-3"></span>
    <span class="grid-dot dot-4"></span>
    <span class="grid-dot dot-5"></span>
  </div>

  <div class="auth-topmark">
    <a href="{{ url_for('home') }}" class="auth-mini-brand">jenny<span>y diego</span></a>
  </div>

  <div class="auth-panel">
    <div class="auth-card auth-card-modern">
      <div class="auth-logo">
        <h1>jenny<span>y diego</span></h1>
        <p>por siempre</p>
      </div>

      <div class="auth-copy">
        <h2>Bienvenido de nuevo</h2>
        <p>Entra para seguir compartiendo mensajes, recuerdos y momentos especiales.</p>
      </div>

      <form method="POST" class="message-form auth-form-modern">
        <div class="input-group">
          <label for="username">Usuario</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Escribe tu usuario"
            required
            autocomplete="username"
          >
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Escribe tu contraseña"
            required
            autocomplete="current-password"
          >
        </div>

        <button type="submit" class="btn auth-submit">Iniciar sesión</button>
      </form>

      <div class="auth-links">
        <a href="{{ url_for('register') }}">Crear cuenta</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
