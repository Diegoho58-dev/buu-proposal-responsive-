{% extends "base.html" %}
{% block title %}Entrar{% endblock %}

{% block content %}
<section class="section auth-section">
  <div class="container narrow">
    <article class="form-card auth-card">
      <p class="eyebrow">Login</p>
      <h1 class="page-title">Entrar</h1>
      <p class="auth-text">
        Ingresa con tu usuario y contraseña para ver el muro, los mensajes y las actividades.
      </p>

      <form method="POST" class="message-form auth-form">
        <label for="username">Usuario</label>
        <input
          id="username"
          name="username"
          type="text"
          placeholder="Escribe tu usuario"
          required
        >

        <label for="password">Contraseña</label>
        <div class="password-field">
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Escribe tu contraseña"
            required
          >
          <button
            type="button"
            class="toggle-password"
            data-toggle-password
            aria-label="Mostrar contraseña"
            aria-pressed="false"
          >
            👁
          </button>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Iniciar sesión</button>
      </form>
    </article>
  </div>
</section>
{% endblock %}
