<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - BUU Proposal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <h1>Bienvenido de nuevo</h1>
            <p>Inicia sesión en tu cuenta</p>

            <form method="POST" action="/login">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="usuario@correo.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="forgot">
                    <a href="/recuperar">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>

                <div class="divider">O</div>

                <div class="social-login">
                    <button class="btn-social google">Google</button>
                    <button class="btn-social apple">Apple</button>
                </div>

                <p class="register">¿No tienes una cuenta? <a href="/registro">Regístrate</a></p>
            </form>
        </div>

        <div class="login-side">
            <img src="{{ url_for('static', filename='buu-small.png') }}" alt="Majin Buu" class="buu-img">
        </div>
    </div>
</body>
</html>
